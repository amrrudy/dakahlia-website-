<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#0d1f17"/>
  <rect x="0" y="200" width="1400" height="800" fill="#1a3a22"/>
  <!-- processing machines -->
  <rect x="80" y="280" width="240" height="340" rx="14" fill="#04793e"/>
  <rect x="580" y="260" width="240" height="360" rx="14" fill="#04793e"/>
  <rect x="1080" y="280" width="240" height="340" rx="14" fill="#04793e"/>
  <!-- machine details -->
  <rect x="110" y="310" width="180" height="80" rx="6" fill="#035a2e"/>
  <rect x="610" y="290" width="180" height="80" rx="6" fill="#035a2e"/>
  <rect x="1110" y="310" width="180" height="80" rx="6" fill="#035a2e"/>
  <!-- conveyor belt -->
  <rect x="0" y="620" width="1400" height="70" rx="6" fill="#035a2e"/>
  <rect x="0" y="628" width="1400" height="18" fill="#62bc54" opacity="0.3"/>
  <!-- cold indicators -->
  <circle cx="200" cy="520" r="38" fill="#62bc54" opacity="0.55"/>
  <circle cx="700" cy="500" r="38" fill="#62bc54" opacity="0.55"/>
  <circle cx="1200" cy="520" r="38" fill="#62bc54" opacity="0.55"/>
  <text x="200" y="530" font-size="32" fill="white" text-anchor="middle" font-family="sans-serif">❄</text>
  <text x="700" y="510" font-size="32" fill="white" text-anchor="middle" font-family="sans-serif">❄</text>
  <text x="1200" y="530" font-size="32" fill="white" text-anchor="middle" font-family="sans-serif">❄</text>
  <!-- pipes connecting -->
  <line x1="320" y1="450" x2="580" y2="450" stroke="#62bc54" stroke-width="12" opacity="0.4"/>
  <line x1="820" y1="450" x2="1080" y2="450" stroke="#62bc54" stroke-width="12" opacity="0.4"/>
</svg>
