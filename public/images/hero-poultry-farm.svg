<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2a1a"/>
      <stop offset="100%" stop-color="#04793e"/>
    </linearGradient>
  </defs>
  <rect width="2400" height="1400" fill="url(#bg)"/>
  <!-- barn roof -->
  <polygon points="400,850 1200,500 2000,850" fill="#035a2e"/>
  <rect x="400" y="850" width="1600" height="550" fill="#024f28"/>
  <!-- windows lit -->
  <rect x="650" y="950" width="200" height="150" rx="6" fill="#e2e01b" opacity="0.35"/>
  <rect x="1100" y="950" width="200" height="150" rx="6" fill="#e2e01b" opacity="0.35"/>
  <rect x="1550" y="950" width="200" height="150" rx="6" fill="#e2e01b" opacity="0.35"/>
  <!-- overhead lights -->
  <circle cx="700" cy="620" r="30" fill="#e2e01b" opacity="0.5"/>
  <circle cx="1200" cy="600" r="30" fill="#e2e01b" opacity="0.5"/>
  <circle cx="1700" cy="620" r="30" fill="#e2e01b" opacity="0.5"/>
  <!-- light beams -->
  <line x1="700" y1="650" x2="700" y2="950" stroke="#e2e01b" stroke-width="2" opacity="0.12"/>
  <line x1="1200" y1="630" x2="1200" y2="950" stroke="#e2e01b" stroke-width="2" opacity="0.12"/>
  <line x1="1700" y1="650" x2="1700" y2="950" stroke="#e2e01b" stroke-width="2" opacity="0.12"/>
  <!-- birds as white blobs -->
  <ellipse cx="600" cy="980" rx="40" ry="28" fill="#faf8ee" opacity="0.55"/>
  <ellipse cx="800" cy="1000" rx="44" ry="30" fill="#faf8ee" opacity="0.55"/>
  <ellipse cx="1000" cy="985" rx="38" ry="26" fill="#faf8ee" opacity="0.55"/>
  <ellipse cx="1200" cy="1000" rx="42" ry="28" fill="#faf8ee" opacity="0.55"/>
  <ellipse cx="1400" cy="980" rx="40" ry="27" fill="#faf8ee" opacity="0.55"/>
  <ellipse cx="1600" cy="1000" rx="44" ry="30" fill="#faf8ee" opacity="0.55"/>
  <ellipse cx="1800" cy="985" rx="38" ry="26" fill="#faf8ee" opacity="0.55"/>
</svg>
